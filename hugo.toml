baseURL = "https://lesdealsdesophie.fr"
languageCode = "fr-fr"
title = "Les Deals de Sophie"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  categorie = "categories"

[params]
  description = "Les meilleures promotions dénichées par Sophie, chaque jour !"
  author = "Sophie"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  accentColor = "#B35A5A"
  defaultTheme = "light"
  disableThemeToggle = true
  customCSS = ["css/sophie.css"]

  [params.profileMode]
    enabled = true
    title = "Les Deals de Sophie"
    subtitle = "Je teste, j'analyse et je tranche. Votre guide cash pour acheter malin sans perdre de temps."
    imageUrl = "images/sophie-avatar.webp"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Sophie"

[menu]
  [[menu.main]]
    name = "Cuisine"
    url = "/categories/cuisine/"
    weight = 1
  [[menu.main]]
    name = "Maison"
    url = "/categories/maison/"
    weight = 2
  [[menu.main]]
    name = "Tech"
    url = "/categories/tech/"
    weight = 3
  [[menu.main]]
    name = "Vanlife"
    url = "/categories/vanlife/"
    weight = 4
  [[menu.main]]
    name = "À propos"
    url = "/a-propos/"
    weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
