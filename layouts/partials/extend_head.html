<link rel="stylesheet" href="/css/sophie.css?v=24">
<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/favicon/site.webmanifest" />
<style>
body.list, .list { background: #1A1C23 !important; }
.nav { flex-direction: column !important; align-items: center !important; padding: 16px 0 4px 0 !important; }
#menu a { font-size: 22px !important; font-family: 'Playfair Display', serif !important; font-weight: 700 !important; }
.post-content, .post-content p, .post-content li { color: #CBD5E0 !important; }
.post-content h1, .post-content h2, .post-content h3, .post-content h4 { color: #E2E8F0 !important; }
.post-content strong { color: #E2E8F0 !important; }
.post-content a { color: #B35A5A !important; }
.post-content table td, .post-content table th { color: #E2E8F0 !important; border-color: #2D323E !important; }
.post-title { color: #E2E8F0 !important; }
.post-meta { color: #A0AEC0 !important; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.post-content img[src*="schema-"]').forEach(function(img) {
    img.addEventListener('click', function() {
      var overlay = document.createElement('div');
      overlay.className = 'schema-lightbox';
      var big = document.createElement('img');
      big.src = img.src;
      big.alt = img.alt;
      overlay.appendChild(big);
      overlay.addEventListener('click', function() { overlay.remove(); });
      document.body.appendChild(overlay);
    });
  });
});
</script>
